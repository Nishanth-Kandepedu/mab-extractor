version: '3.8'

services:
  abminer:
    build: .
    container_name: abminer-app
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Provide your API keys here or in a .env file on your server
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always
